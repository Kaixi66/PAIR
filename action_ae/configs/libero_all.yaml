run:
  run_root_dir: /umd-datapool/kaixi/PAIR/action_ae_runs
  run_name: null

data:
  data_root_dir: /data/kaixi/dataset/libero
  mixture: libero_4_task_suites_no_noops
  train_split: train[:95%]
  eval_split: train[95%:]
  shuffle_buffer_size: 256000
  traj_transform_threads: 4
  traj_read_threads: 4
  balance_weights: true
  include_dataset_name: true

model:
  horizon: 8
  action_dim: 7
  hidden_dim: 64
  latent_dim: 16
  encoder_layers: 4
  decoder_layers: 2
  num_heads: 4
  ffn_dim: 256
  dropout: 0.0
  activation: gelu
  norm_first: true

training:
  batch_size: 1024
  max_steps: 100000
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  warmup_steps: 1000
  grad_clip_norm: 1.0
  log_every: 100
  eval_every: 5000
  save_every: 10000
  eval_batches: 20
  seed: 7
  device: null

wandb:
  mode: online
  entity: kaixi-university-of-maryland
  project: PAIR
